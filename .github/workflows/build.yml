name: Build NativeLib Plugin APK

# Tự động chạy khi bạn push code lên nhánh 'main'
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  # Cho phép bấm nút chạy thủ công trên giao diện GitHub
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Clone code từ repo của bạn về máy chủ GitHub
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Cài đặt môi trường Java (Android cần Java 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Cấp quyền thực thi cho file gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Chạy lệnh Build APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5. Lấy file APK đã build xong tải lên GitHub để bạn tải về
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Axiom-Veil-Plugin-APK
          path: app/build/outputs/apk/debug/app-debug.apk